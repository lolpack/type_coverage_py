<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prioritized Type Coverage Historical Trends</title>
    <link rel="icon" href="https://raw.githubusercontent.com/jdecked/twemoji/master/assets/svg/2705.svg" type="image/svg+xml">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --primary-color: #1a73e8;
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --text-color: #1a202c;
            --text-muted: #64748b;
            --border-color: #e2e8f0;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }

        * {
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 40px 20px;
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.6;
        }

        h1 {
            text-align: center;
            font-size: 2.2rem;
            color: var(--text-color);
            margin-bottom: 40px;
        }

        .controls {
            max-width: 1200px;
            margin: 0 auto 30px;
            background: var(--card-bg);
            padding: 20px;
            border-radius: 12px;
            box-shadow: var(--shadow);
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            align-items: center;
        }

        .controls label {
            font-weight: 600;
            color: var(--text-color);
        }

        .controls select, .controls input {
            padding: 10px 14px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-size: 1rem;
            background: white;
        }

        .controls select {
            min-width: 200px;
        }

        .back-link {
            display: inline-block;
            margin-bottom: 20px;
            color: var(--primary-color);
            text-decoration: none;
            font-weight: 500;
        }

        .back-link:hover {
            text-decoration: underline;
        }

        .loading {
            text-align: center;
            padding: 60px;
            font-size: 1.2rem;
            color: var(--text-muted);
        }

        .table-container {
            margin: 0 auto;
            max-width: 1200px;
            background-color: var(--card-bg);
            padding: 24px;
            border-radius: 12px;
            box-shadow: var(--shadow);
        }

        .package-card {
            background: white;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            margin-bottom: 24px;
            overflow: hidden;
        }

        .package-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 20px;
            background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
            border-bottom: 1px solid var(--border-color);
        }

        .package-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .package-name {
            font-size: 1.2rem;
            font-weight: 600;
            color: var(--text-color);
        }

        .package-rank {
            background: var(--primary-color);
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
        }

        .coverage-badge {
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: 700;
            font-family: 'Consolas', 'Monaco', monospace;
        }

        .coverage-high {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            color: white;
        }

        .coverage-medium {
            background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%);
            color: white;
        }

        .coverage-low {
            background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
            color: white;
        }

        .chart-container {
            padding: 20px;
            height: 350px;
        }

        .legend-container {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            padding: 12px 20px;
            background: #f8fafc;
            border-top: 1px solid var(--border-color);
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.85rem;
            color: var(--text-muted);
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 4px;
            transition: background 0.2s;
        }

        .legend-item:hover {
            background: #e2e8f0;
        }

        .legend-color {
            width: 14px;
            height: 14px;
            border-radius: 3px;
        }

        .no-data {
            padding: 40px;
            text-align: center;
            color: var(--text-muted);
        }

        @media (max-width: 768px) {
            body {
                padding: 20px 10px;
            }

            h1 {
                font-size: 1.6rem;
            }

            .controls {
                flex-direction: column;
                align-items: stretch;
            }

            .chart-container {
                height: 280px;
            }
        }
    </style>
</head>
<body>
    <a href="../index.html" class="back-link">← Back to Prioritized Package Report</a>
    
    <h1>📈 Prioritized Type Coverage Historical Trends</h1>

    <div class="controls">
        <div>
            <label for="package-filter">🔍 Filter package: </label>
            <input type="text" id="package-filter" placeholder="Type to filter packages...">
        </div>
        <div>
            <label for="metric-select">📊 Primary metric: </label>
            <select id="metric-select">
                <option value="pyright" selected>Pyright Coverage</option>
                <option value="param_stubs">Parameter Coverage (with Stubs)</option>
                <option value="return_stubs">Return Coverage (with Stubs)</option>
                <option value="param">Parameter Coverage</option>
                <option value="return">Return Coverage</option>
            </select>
        </div>
        <div>
            <label for="limit-select">📋 Show packages: </label>
            <select id="limit-select">
                <option value="20">Top 20</option>
                <option value="50">Top 50</option>
                <option value="100">Top 100</option>
                <option value="all">All</option>
            </select>
        </div>
    </div>

    <div id="charts-container" class="table-container">
        <div class="loading">Loading historical data...</div>
    </div>

    <script type="module" src="scripts/coverage-trends.js"></script>
</body>
</html>
