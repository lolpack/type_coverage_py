name: Daily Type Checker Timing Benchmark

on:
  schedule:
    # Daily at 5 AM UTC (ubuntu + windows)
    - cron: '0 5 * * *'
    # Weekly on Wednesdays at 5 AM UTC (macos)
    - cron: '0 5 * * 3'
  workflow_dispatch:
    inputs:
      package_count:
        description: 'Number of packages to benchmark (0 = all with install config)'
        required: false
        default: '0'

jobs:
  benchmark:
    strategy:
      fail-fast: false
      matrix:
        os: ${{ fromJSON(
          github.event_name == 'workflow_dispatch' && '["ubuntu-latest","macos-latest","windows-latest"]' ||
          github.event.schedule == '0 5 * * 3' && '["macos-latest"]' ||
          '["ubuntu-latest","windows-latest"]'
          ) }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 240

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          ssh-key: ${{ secrets.SSH_PRIVATE_KEY }}
          ref: main

      - name: Setup SSH Known Hosts
        shell: bash
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan github.com >> ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python Dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Node.js (for Pyright)
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Type Checkers
        shell: bash
        run: |
          # Install Pyright via npm
          npm install -g pyright

          # Install type checkers via pip
          pip install --upgrade pyrefly || echo "Pyrefly not available"
          pip install --upgrade ty || echo "ty not available"
          pip install --upgrade mypy || echo "mypy not available"
          pip install --upgrade zuban || echo "Zuban not available"

          # Verify installations
          echo "Installed type checkers:"
          which pyright && echo "  pyright: $(pyright --version)" || echo "  pyright: not found"
          which pyrefly && echo "  pyrefly: $(pyrefly --version)" || echo "  pyrefly: not found"
          which ty && echo "  ty: $(ty --version)" || echo "  ty: not found"
          python -c "import mypy; print(f'  mypy: installed')" || echo "  mypy: not found"
          which zuban && echo "  zuban: $(zuban --version)" || echo "  zuban: not found"

      - name: Fetch accumulated results from published-report
        shell: bash
        run: |
          git fetch origin published-report
          git checkout origin/published-report -- \
            typecheck_benchmark/results/ \
            2>/dev/null || true

      - name: Run Type Checker Timing Benchmark
        shell: bash
        run: |
          PACKAGE_COUNT="${{ github.event.inputs.package_count || '0' }}"

          # Determine OS name
          case "${{ matrix.os }}" in
            ubuntu-*) OS_NAME="ubuntu" ;;
            macos-*) OS_NAME="macos" ;;
            windows-*) OS_NAME="windows" ;;
            *) OS_NAME="${{ matrix.os }}" ;;
          esac

          if [ "$PACKAGE_COUNT" = "0" ]; then
            python -m typecheck_benchmark \
              --checkers pyright pyrefly ty mypy zuban \
              --output typecheck_benchmark/results \
              --os-name "$OS_NAME"
          else
            python -m typecheck_benchmark \
              --packages "$PACKAGE_COUNT" \
              --checkers pyright pyrefly ty mypy zuban \
              --output typecheck_benchmark/results \
              --os-name "$OS_NAME"
          fi

      - name: Upload Results Artifact
        uses: actions/upload-artifact@v4
        with:
          name: typecheck-benchmark-results-${{ matrix.os }}
          path: typecheck_benchmark/results/
          retention-days: 90

      - name: Build frontend
        shell: bash
        run: |
          npm ci
          npm run build

      - name: Deploy to published-report
        shell: bash
        run: |
          export GIT_SSH_COMMAND=$(git config --local core.sshCommand)
          git clone --branch published-report --single-branch --depth 1 \
            "git@github.com:${{ github.repository }}.git" /tmp/deploy

          # Determine OS name for this matrix job
          case "${{ matrix.os }}" in
            ubuntu-*) OS_NAME="ubuntu" ;;
            macos-*) OS_NAME="macos" ;;
            windows-*) OS_NAME="windows" ;;
            *) OS_NAME="${{ matrix.os }}" ;;
          esac

          # Copy only this OS's result files to avoid overwriting other OS's
          # latest files in a race condition between concurrent matrix jobs
          mkdir -p /tmp/deploy/typecheck_benchmark/results
          cp typecheck_benchmark/results/benchmark_*_${OS_NAME}.json /tmp/deploy/typecheck_benchmark/results/ 2>/dev/null || true
          cp typecheck_benchmark/results/latest-${OS_NAME}.json /tmp/deploy/typecheck_benchmark/results/ 2>/dev/null || true

          # Copy site files
          cp typecheck_benchmark/index.html /tmp/deploy/typecheck_benchmark/
          mkdir -p /tmp/deploy/typecheck_benchmark/scripts
          cp typecheck_benchmark/scripts/typecheck-benchmark.js /tmp/deploy/typecheck_benchmark/scripts/
          mkdir -p /tmp/deploy/typecheck_benchmark/styles
          cp typecheck_benchmark/styles/typecheck-benchmark.css /tmp/deploy/typecheck_benchmark/styles/

          # Commit and push (with retry for concurrent matrix jobs)
          cd /tmp/deploy
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add \
            typecheck_benchmark/results/ \
            typecheck_benchmark/index.html \
            typecheck_benchmark/scripts/typecheck-benchmark.js \
            typecheck_benchmark/styles/typecheck-benchmark.css
          git diff --staged --quiet && exit 0
          git commit -m "Update typecheck timing benchmark results [skip ci]"
          for i in 1 2 3 4 5; do
            git push origin published-report && break
            echo "Push failed, retrying ($i/5)..."
            git pull --rebase origin published-report
            sleep $((i * 5))
          done
