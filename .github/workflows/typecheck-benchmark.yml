name: Daily Type Checker Timing Benchmark

on:
  schedule:
    # Daily at 5 AM UTC (ubuntu + windows)
    - cron: '0 5 * * *'
    # Weekly on Wednesdays at 5 AM UTC (macos)
    - cron: '0 5 * * 3'
  workflow_dispatch:
    inputs:
      package_count:
        description: 'Number of packages to benchmark (0 = all with install config)'
        required: false
        default: '0'
  push:
    branches: [ fix-mypy-benchmark ]

jobs:
  benchmark:
    strategy:
      fail-fast: false
      matrix:
        os: ${{ fromJSON(
          github.event_name == 'push' && '["ubuntu-latest","macos-latest","windows-latest"]' ||
          github.event_name == 'workflow_dispatch' && '["ubuntu-latest","macos-latest","windows-latest"]' ||
          github.event.schedule == '0 5 * * 3' && '["macos-latest"]' ||
          '["ubuntu-latest","windows-latest"]'
          ) }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 240

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          ssh-key: ${{ secrets.SSH_PRIVATE_KEY }}
          ref: ${{ github.event_name == 'push' && github.ref || 'published-report' }}

      - name: Setup SSH Known Hosts
        shell: bash
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan github.com >> ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python Dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Node.js (for Pyright)
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Type Checkers
        shell: bash
        run: |
          # Install Pyright via npm
          npm install -g pyright

          # Install type checkers via pip
          pip install --upgrade pyrefly || echo "Pyrefly not available"
          pip install --upgrade ty || echo "ty not available"
          pip install --upgrade mypy || echo "mypy not available"
          pip install --upgrade zuban || echo "Zuban not available"

          # Verify installations
          echo "Installed type checkers:"
          which pyright && echo "  pyright: $(pyright --version)" || echo "  pyright: not found"
          which pyrefly && echo "  pyrefly: $(pyrefly --version)" || echo "  pyrefly: not found"
          which ty && echo "  ty: $(ty --version)" || echo "  ty: not found"
          python -c "import mypy; print(f'  mypy: installed')" || echo "  mypy: not found"
          which zuban && echo "  zuban: $(zuban --version)" || echo "  zuban: not found"

      - name: Run Type Checker Timing Benchmark
        shell: bash
        run: |
          PACKAGE_COUNT="${{ github.event.inputs.package_count || '0' }}"

          # Determine OS name
          case "${{ matrix.os }}" in
            ubuntu-*) OS_NAME="ubuntu" ;;
            macos-*) OS_NAME="macos" ;;
            windows-*) OS_NAME="windows" ;;
            *) OS_NAME="${{ matrix.os }}" ;;
          esac

          if [ "$PACKAGE_COUNT" = "0" ]; then
            python -m typecheck_benchmark \
              --checkers pyright pyrefly ty mypy zuban \
              --output typecheck_benchmark/results \
              --os-name "$OS_NAME"
          else
            python -m typecheck_benchmark \
              --packages "$PACKAGE_COUNT" \
              --checkers pyright pyrefly ty mypy zuban \
              --output typecheck_benchmark/results \
              --os-name "$OS_NAME"
          fi

      - name: Upload Results Artifact
        uses: actions/upload-artifact@v4
        with:
          name: typecheck-benchmark-results-${{ matrix.os }}
          path: typecheck_benchmark/results/
          retention-days: 90

      - name: Stash Changes
        if: github.event_name != 'push'
        shell: bash
        run: |
          git add .
          git stash

      - name: Pull Latest Changes
        if: github.event_name != 'push'
        shell: bash
        run: git pull origin published-report --rebase

      - name: Apply Stashed Changes
        if: github.event_name != 'push'
        shell: bash
        run: git stash pop || true

      - name: Build and validate frontend
        run: |
          npm ci
          npm run build
          if grep -rn '<<<<<<<\|>>>>>>>\|=======' --include='*.ts' --include='*.js' --exclude='*.min.js' --exclude-dir=node_modules .; then
            echo "::error::Merge conflict markers found"
            exit 1
          fi

      - name: Commit and Push Results
        uses: stefanzweifel/git-auto-commit-action@v4
        with:
          commit_message: "Update typecheck timing benchmark results [skip ci]"
          branch: ${{ github.event_name == 'push' && github.ref_name || 'published-report' }}
          file_pattern: 'typecheck_benchmark/results/*.json'
