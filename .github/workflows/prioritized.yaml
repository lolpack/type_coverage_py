name: Daily Prioritized List Runner

on:
  schedule:
    - cron: '0 15 * * *' # Runs at 10am EST
  workflow_dispatch: # Allows manual triggers

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          ssh-key: ${{ secrets.SSH_PRIVATE_KEY }}
          ref: main

      - name: Setup SSH Known Hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan github.com >> ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Pyright
        run: npm install -g pyright

      - name: Clone Typeshed Repository
        run: git clone https://github.com/python/typeshed.git

      - name: Fetch accumulated data from published-report
        run: |
          git fetch origin published-report
          git checkout origin/published-report -- \
            prioritized/package_report.json \
            prioritized/historical_data/json/ \
            2>/dev/null || true

      - name: Run Main Script
        shell: bash
        run: python main.py --archive-prioritized --package-list included_packages.txt

      - name: Build frontend
        shell: bash
        run: |
          npm ci
          npm run build

      - name: Deploy to published-report
        shell: bash
        run: |
          export GIT_SSH_COMMAND=$(git config --local core.sshCommand)
          git clone --branch published-report --single-branch --depth 1 \
            "git@github.com:${{ github.repository }}.git" /tmp/deploy

          # Copy prioritized data files
          mkdir -p /tmp/deploy/prioritized/historical_data/json
          cp prioritized/package_report.json /tmp/deploy/prioritized/
          cp prioritized/historical_data/json/*.json /tmp/deploy/prioritized/historical_data/json/

          # Copy HTML pages
          cp prioritized/index.html /tmp/deploy/prioritized/
          cp prioritized/historical_data/coverage-trends.html /tmp/deploy/prioritized/historical_data/

          # Copy JS files
          mkdir -p /tmp/deploy/prioritized/scripts
          cp prioritized/scripts/main.js /tmp/deploy/prioritized/scripts/
          mkdir -p /tmp/deploy/prioritized/historical_data/scripts
          cp prioritized/historical_data/scripts/coverage-trends.js /tmp/deploy/prioritized/historical_data/scripts/

          # Copy CSS files
          cp prioritized/historical_data/graph.css /tmp/deploy/prioritized/historical_data/

          # Commit and push
          cd /tmp/deploy
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add \
            prioritized/package_report.json prioritized/historical_data/json/ \
            prioritized/index.html prioritized/historical_data/coverage-trends.html \
            prioritized/scripts/ prioritized/historical_data/scripts/ \
            prioritized/historical_data/graph.css
          git diff --staged --quiet || git commit -m "add latest prioritized data"
          git push origin published-report
