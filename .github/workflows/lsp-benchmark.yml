name: Daily LSP Benchmark

on:
  schedule:
    # Daily at 3 AM UTC (ubuntu + windows)
    - cron: '0 3 * * *'
    # Weekly on Tuesdays at 3 AM UTC (macos)
    - cron: '0 3 * * 2'
  workflow_dispatch:
    inputs:
      package_count:
        description: 'Number of packages to benchmark (use 0 for all prioritized packages)'
        required: false
        default: '0'
      runs_per_package:
        description: 'Number of benchmark runs per package'
        required: false
        default: '100'

jobs:
  benchmark:
    strategy:
      fail-fast: false
      matrix:
        os: ${{ fromJSON(
          github.event_name == 'workflow_dispatch' && '["ubuntu-latest","macos-latest","windows-latest"]' ||
          github.event.schedule == '0 3 * * 2' && '["macos-latest"]' ||
          '["ubuntu-latest","windows-latest"]'
          ) }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 180

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          ssh-key: ${{ secrets.SSH_PRIVATE_KEY }}
          ref: main

      - name: Setup SSH Known Hosts
        shell: bash
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan github.com >> ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python Dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Node.js (for Pyright)
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Type Checkers
        shell: bash
        run: |
          # Install Pyright (always get latest)
          npm install -g pyright

          # Install type checkers via pip (always get latest)
          pip install --upgrade pyrefly || echo "Pyrefly not available via pip"
          pip install --upgrade ty || echo "ty not available via pip"
          pip install --upgrade zuban || echo "Zuban not available via pip"

          # Verify installations
          echo "Installed type checkers:"
          which pyright-langserver && echo "  pyright: $(pyright --version)" || echo "  pyright: not found"
          which pyrefly && echo "  pyrefly: installed" || echo "  pyrefly: not found"
          which ty && echo "  ty: installed" || echo "  ty: not found"
          which zubanls && echo "  zuban: installed" || echo "  zuban: not found"

      - name: Fetch accumulated results from published-report
        shell: bash
        run: |
          git fetch origin published-report
          git checkout origin/published-report -- \
            lsp/benchmark/results/ \
            2>/dev/null || true

      - name: Run LSP Benchmark
        shell: bash
        run: |
          PACKAGE_COUNT="${{ github.event.inputs.package_count || '0' }}"
          RUNS="${{ github.event.inputs.runs_per_package || '100' }}"

          # Determine OS name for output file
          case "${{ matrix.os }}" in
            ubuntu-*) OS_NAME="ubuntu" ;;
            macos-*) OS_NAME="macos" ;;
            windows-*) OS_NAME="windows" ;;
            *) OS_NAME="${{ matrix.os }}" ;;
          esac

          # If package_count is 0, use all prioritized packages (don't pass --packages flag)
          if [ "$PACKAGE_COUNT" = "0" ]; then
            python -m lsp.benchmark.daily_runner \
              --runs "$RUNS" \
              --checkers pyright pyrefly ty zuban \
              --output lsp/benchmark/results \
              --os-name "$OS_NAME"
          else
            python -m lsp.benchmark.daily_runner \
              --packages "$PACKAGE_COUNT" \
              --runs "$RUNS" \
              --checkers pyright pyrefly ty zuban \
              --output lsp/benchmark/results \
              --os-name "$OS_NAME"
          fi

      - name: Upload Results Artifact
        uses: actions/upload-artifact@v4
        with:
          name: lsp-benchmark-results-${{ matrix.os }}
          path: lsp/benchmark/results/
          retention-days: 90

      - name: Build frontend
        shell: bash
        run: |
          npm ci
          npm run build

      - name: Deploy to published-report
        shell: bash
        run: |
          export GIT_SSH_COMMAND=$(git config --local core.sshCommand)
          git clone --branch published-report --single-branch --depth 1 \
            "git@github.com:${{ github.repository }}.git" /tmp/deploy

          # Copy result files
          mkdir -p /tmp/deploy/lsp/benchmark/results
          cp lsp/benchmark/results/*.json /tmp/deploy/lsp/benchmark/results/

          # Copy site files
          cp lsp/benchmark/index.html /tmp/deploy/lsp/benchmark/
          mkdir -p /tmp/deploy/lsp/benchmark/scripts
          cp lsp/benchmark/scripts/lsp-benchmark.js /tmp/deploy/lsp/benchmark/scripts/
          mkdir -p /tmp/deploy/lsp/benchmark/styles
          cp lsp/benchmark/styles/lsp-benchmark.css /tmp/deploy/lsp/benchmark/styles/

          # Commit and push (with retry for concurrent matrix jobs)
          cd /tmp/deploy
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add \
            lsp/benchmark/results/ \
            lsp/benchmark/index.html \
            lsp/benchmark/scripts/lsp-benchmark.js \
            lsp/benchmark/styles/lsp-benchmark.css
          git diff --staged --quiet && exit 0
          git commit -m "Update LSP benchmark results [skip ci]"
          for i in 1 2 3 4 5; do
            git push origin published-report && break
            echo "Push failed, retrying ($i/5)..."
            git pull --rebase origin published-report
            sleep $((i * 5))
          done
