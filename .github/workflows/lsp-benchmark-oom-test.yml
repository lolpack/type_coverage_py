name: LSP Benchmark - OOM Fix Test (cryptography)

on:
  push:
    branches:
      - fix/lsp-batch-oom

jobs:
  benchmark:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python Dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Node.js (for Pyright)
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Type Checkers
        shell: bash
        run: |
          npm install -g pyright
          pip install --upgrade pyrefly || echo "Pyrefly not available via pip"
          pip install --upgrade ty || echo "ty not available via pip"
          pip install --upgrade zuban || echo "Zuban not available via pip"

      - name: Run LSP Benchmark on cryptography
        shell: bash
        run: |
          python -m lsp.benchmark.daily_runner \
            --package-names cryptography \
            --runs 100 \
            --checkers pyright pyrefly ty zuban \
            --output /tmp/oom-test-results \
            --os-name "ubuntu"

      - name: Upload Results
        uses: actions/upload-artifact@v4
        with:
          name: lsp-benchmark-oom-test-results
          path: /tmp/oom-test-results/
          retention-days: 30
