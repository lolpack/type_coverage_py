name: LSP Benchmark with Deps Installed

on:
  push:
    branches:
      - feat/install-deps-benchmark

jobs:
  benchmark:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python Dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Node.js (for Pyright)
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Type Checkers
        shell: bash
        run: |
          npm install -g pyright
          pip install --upgrade pyrefly || echo "Pyrefly not available via pip"
          pip install --upgrade ty || echo "ty not available via pip"

          echo "Installed type checkers:"
          which pyright-langserver && echo "  pyright: $(pyright --version)" || echo "  pyright: not found"
          which pyrefly && echo "  pyrefly: installed" || echo "  pyrefly: not found"
          which ty && echo "  ty: installed" || echo "  ty: not found"

      - name: Run LSP Benchmark (with deps)
        shell: bash
        run: |
          python -m lsp.benchmark.daily_runner \
            --package-names \
              requests numpy scipy click pytest torch transformers \
              pyopengl ansible kivy wagtail pandas pyarrow ujson \
              homeassistant sphinx \
            --runs 100 \
            --checkers pyright pyrefly ty \
            --output lsp/benchmark/results \
            --os-name ubuntu \
            --install-deps

      - name: Upload Results Artifact
        uses: actions/upload-artifact@v4
        with:
          name: lsp-benchmark-install-deps-ubuntu-latest
          path: lsp/benchmark/results/
          retention-days: 90
